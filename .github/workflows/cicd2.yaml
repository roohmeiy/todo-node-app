name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: todo-node-app

jobs:

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - run: npm install
      - run: npm test

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image-tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.DOCKER_PASSWORD }}" | \
              docker login -u "${{ secrets.DOCKERHUB_USER }}" --password-stdin
            docker pull ${{ secrets.DOCKERHUB_USER }}/todo-node-app:${{ needs.build-and-push.outputs.image-tag }}
            docker rm -f node_container || true
            docker run -d \
              --name node_container \
              --restart unless-stopped \
              -p 8000:8000 \
              ${{ secrets.DOCKERHUB_USER }}/todo-node-app:${{ needs.build-and-push.outputs.image-tag }}
            docker image prune -f